version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lifeos-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lifeos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lifeos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
